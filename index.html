<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário de Notas — Aeroclube de Londrina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0E2A5C;
  --navy-deep:#081B3F;
  --navy-soft:#1B3D7A;
  --red:#D31021;
  --red-dark:#A50D1A;
  --paper:#F3F5FA;
  --card:#FFFFFF;
  --line:#D8DFEC;
  --ink:#16233D;
  --muted:#5B6B8C;
  --ok:#0F7A3D;
  --warn:#B45309;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}

/* ---------- Header ---------- */
header.app{
  background:linear-gradient(180deg,var(--navy) 0%,var(--navy-deep) 100%);
  color:#fff;display:flex;align-items:center;gap:14px;
  padding:12px 20px;border-bottom:4px solid var(--red);
}
header.app img{height:52px;width:auto;background:#fff;border-radius:8px;padding:4px}
header.app .titles h1{
  font-family:'Barlow Condensed',sans-serif;font-style:italic;font-weight:700;
  font-size:26px;text-transform:uppercase;letter-spacing:.05em;line-height:1;
}
header.app .titles span{font-size:12.5px;color:#B9C6E2;letter-spacing:.14em;text-transform:uppercase}
header.app .spacer{flex:1}
header.app .hbtn{
  background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;
  border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;
}
header.app .hbtn:hover{background:rgba(255,255,255,.12)}

/* ---------- Layout ---------- */
.layout{display:flex;min-height:calc(100vh - 85px)}
aside{
  width:250px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);
  padding:16px 12px;display:flex;flex-direction:column;gap:8px;
}
aside .label{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;font-size:13px;color:var(--muted);padding:0 6px;
}
.turma-item{
  display:block;width:100%;text-align:left;background:none;border:1px solid transparent;
  border-radius:var(--radius);padding:10px 12px;line-height:1.3;
}
.turma-item strong{display:block;font-size:14.5px;font-weight:600;color:var(--ink)}
.turma-item small{color:var(--muted);font-size:12.5px}
.turma-item:hover{background:#EEF2FA}
.turma-item.active{background:var(--navy);border-color:var(--navy)}
.turma-item.active strong{color:#fff}
.turma-item.active small{color:#B9C6E2}
.btn{
  border:none;border-radius:var(--radius);padding:9px 14px;font-weight:600;font-size:14px;
}
.btn.red{background:var(--red);color:#fff}
.btn.red:hover{background:var(--red-dark)}
.btn.navy{background:var(--navy);color:#fff}
.btn.navy:hover{background:var(--navy-soft)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.danger-ghost{background:#fff;border:1px solid var(--line);color:var(--red)}
.btn.danger-ghost:hover{border-color:var(--red);background:#FDF1F2}

main{flex:1;padding:22px 26px;max-width:1100px}

/* ---------- Turma header ---------- */
.turma-head{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.turma-head h2{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;
  text-transform:uppercase;font-size:30px;color:var(--navy);letter-spacing:.02em;line-height:1;
}
.turma-head .sub{color:var(--muted);font-size:13.5px;margin-top:4px}
.turma-head .actions{margin-left:auto;display:flex;gap:8px}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px}
.tab{
  background:none;border:none;padding:9px 16px;font-weight:600;font-size:14.5px;color:var(--muted);
  border-bottom:3px solid transparent;margin-bottom:-2px;
}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* ---------- Matéria pills ---------- */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pill{
  border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:7px 16px;font-weight:600;font-size:13.5px;color:var(--ink);
}
.pill:hover{border-color:var(--navy)}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ---------- Card & tables ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.card .card-pad{padding:16px 18px}
table.grade{width:100%;border-collapse:collapse}
table.grade th{
  background:var(--navy);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-weight:600;text-transform:uppercase;letter-spacing:.08em;font-size:13.5px;
  padding:9px 12px;text-align:center;white-space:nowrap;
}
table.grade th:first-child{text-align:left}
table.grade th.rec-th{background:var(--red)}
.nota-input.rec{border-color:#F0B9BE;background:#FEF7F7}
.nota-input.rec:focus{outline:2px solid var(--red);border-color:var(--red)}
table.grade td{border-bottom:1px solid var(--line);padding:6px 12px;text-align:center}
table.grade td:first-child{text-align:left;font-weight:500}
table.grade tr:nth-child(even) td{background:#F8FAFD}
table.grade tr:last-child td{border-bottom:none}
.nota-input{
  width:64px;text-align:center;border:1px solid var(--line);border-radius:7px;
  padding:6px 4px;font-weight:600;color:var(--ink);background:#fff;
}
.nota-input:focus{outline:2px solid var(--navy);border-color:var(--navy)}
.media-cell{font-weight:700;color:var(--navy)}
.badge{display:inline-block;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;letter-spacing:.04em}
.badge.ok{background:#E5F5EC;color:var(--ok)}
.badge.rep{background:#FDECEC;color:var(--red)}
.badge.pend{background:#EFF2F8;color:var(--muted)}

/* ---------- Alunos ---------- */
.aluno-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line)}
.aluno-row:last-child{border-bottom:none}
.aluno-row .nome{flex:1;font-weight:500}
.icon-btn{background:none;border:none;color:var(--muted);font-size:15px;padding:4px 6px;border-radius:6px}
.icon-btn:hover{color:var(--red);background:#FDF1F2}
.add-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.add-row input[type=text],.add-row input[type=number],.add-row textarea{
  border:1px solid var(--line);border-radius:8px;padding:9px 12px;flex:1;min-width:180px;
}
.add-row input:focus,.add-row textarea:focus{outline:2px solid var(--navy)}
textarea{resize:vertical}

.materia-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line)}
.materia-row:last-child{border-bottom:none}
.materia-row .nome{flex:1;font-weight:600}
.materia-row .provas{color:var(--muted);font-size:13.5px;white-space:nowrap}

.hint{color:var(--muted);font-size:13px;margin-top:10px}
.empty{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.empty h3{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:22px;color:var(--navy);margin-bottom:8px}

/* ---------- Modal ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(8,27,63,.55);display:none;
  align-items:center;justify-content:center;z-index:50;padding:16px;
}
.overlay.open{display:flex}
.modal{
  background:#fff;border-radius:14px;width:100%;max-width:460px;padding:22px;
  border-top:5px solid var(--red);max-height:90vh;overflow:auto;
}
.modal h3{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-style:italic;
  color:var(--navy);font-size:22px;margin-bottom:14px;
}
.modal label{display:block;font-weight:600;font-size:13.5px;margin:12px 0 5px;color:var(--ink)}
.modal input[type=text],.modal input[type=number],.modal select{
  width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;
}
.modal input:focus,.modal select:focus{outline:2px solid var(--navy)}
.modal .mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}

/* ---------- Relatório (print) ---------- */
#report{display:none}
@media print{
  body>*:not(#report){display:none !important}
  #report{display:block}
  body{background:#fff}
}
#report{font-family:'Barlow',sans-serif;color:#111;padding:0 8px}
#report .rep-head{
  display:flex;align-items:center;gap:16px;border-bottom:3px solid var(--navy);
  padding-bottom:12px;margin-bottom:6px;
}
#report .rep-head img{height:80px}
#report .rep-head h1{
  font-family:'Barlow Condensed',sans-serif;font-style:italic;text-transform:uppercase;
  color:var(--navy);font-size:26px;line-height:1.1;
}
#report .rep-head p{font-size:13px;color:#444;margin-top:3px}
#report .rep-strip{height:5px;background:var(--red);margin-bottom:18px}
#report h2{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;color:var(--navy);
  font-size:19px;margin:22px 0 8px;border-left:5px solid var(--red);padding-left:9px;
}
#report table{width:100%;border-collapse:collapse;font-size:12.5px;page-break-inside:avoid}
#report th{background:var(--navy);color:#fff;padding:6px 8px;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.06em}
#report td{border:1px solid #C9D2E3;padding:5px 8px;text-align:center}
#report td:first-child,#report th:first-child{text-align:left}
#report .rep-foot{margin-top:34px;font-size:12px;color:#444;display:flex;justify-content:space-between;align-items:flex-end}
#report .assin{border-top:1px solid #333;width:260px;text-align:center;padding-top:5px}
#report .final-strong{font-weight:700}

/* ---------- Responsive ---------- */
@media(max-width:820px){
  .layout{flex-direction:column}
  aside{width:100%;border-right:none;border-bottom:1px solid var(--line);flex-direction:row;flex-wrap:wrap;align-items:center}
  aside .label{width:100%}
  main{padding:16px 14px}
  .table-wrap{overflow-x:auto}
}
.table-wrap{overflow-x:auto}
</style>
</head>

<script>
/* =========================================================
   Armazenamento: usa localStorage quando disponível
   (GitHub Pages) e memória como reserva (pré-visualização).
   ========================================================= */
const KEY='acl-notas-v1';
let memStore=null;
function loadData(){
  try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw);}catch(e){}
  return memStore;
}
function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){memStore=DB;}
}

  const nav={id:uid(),nome:'Navegação',provas:2};
  const cga={id:uid(),nome:'CGA',provas:2};
  const p1Met={'Ana Julia Cardoso':95,'Beatriz':100,'Daniele Marques':90,'Gyovanna':100,'Helena Vitória':100,'Jean':100,'Jéssica Fiorini':95,'Julia Diniz':85,'Julia Vitória':100,'Larissa Costa':100,'Maria Clara':80,'Priscila Alves':100,'Sirlei Gomes':80};
  const notas={};
  notas[met.id]={};
  alunos.forEach(a=>{notas[met.id][a.id]={p:[p1Met[a.nome]??null,null],rec:null};});
  return {turmas:[{
    id:uid(),nome:'Turma 02 de 2026 — Comissários',minima:70,
    alunos,materias:[met,nav,cga],notas
  }]};
}

function migrate(db){
  (db.turmas||[]).forEach(t=>{
    t.notas=t.notas||{};
    Object.keys(t.notas).forEach(mid=>{
      Object.keys(t.notas[mid]).forEach(aid=>{
        const v=t.notas[mid][aid];
        if(Array.isArray(v))t.notas[mid][aid]={p:v,rec:null};
      });
    });
  });
  return db;
}
let DB=migrate(loadData()||seed());
persist();

/* ---------- Estado da interface ---------- */
let curTurma=DB.turmas[0]?DB.turmas[0].id:null;
let curTab='notas';
let curMat=null;
let editingTurma=null, editingMat=null;

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function turma(){return DB.turmas.find(t=>t.id===curTurma);}
function sortAlunos(t){return [...t.alunos].sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR',{sensitivity:'base'}));}

function getNotas(t,mat,alunoId){
  const o=t.notas[mat.id]&&t.notas[mat.id][alunoId];
  return o||{p:[],rec:null};
}
function mediaAluno(t,mat,alunoId){
  const o=getNotas(t,mat,alunoId);
  const p=Array.from({length:mat.provas},(_,i)=>o.p?o.p[i]:undefined);
  const vals=p.filter(v=>v!==null&&v!==undefined&&v!=='').map(Number);
  const rec=(o.rec===null||o.rec===undefined||o.rec==='')?null:Number(o.rec);
  if(!vals.length)return{media:null,completa:false,rec,usouRec:false};
  const completa=vals.length===mat.provas;
  let usadas=[...vals],usouRec=false;
  if(completa&&rec!==null){
    // A REC substitui a nota mais baixa apenas se melhorar a média
    const idxMin=usadas.indexOf(Math.min(...usadas));
    if(rec>usadas[idxMin]){
      usadas[idxMin]=rec;
      usouRec=true;
    }
  }
  const parcial=usadas.reduce((s,v)=>s+v,0)/usadas.length;
  return{media:completa?parcial:null,parcial,completa,rec,usouRec};
}
function fmt(n){return n===null||n===undefined?'—':(Math.round(n*10)/10).toLocaleString('pt-BR');}

/* =========================================================
   Renderização
   ========================================================= */
function render(){
  renderSidebar();
  const t=turma();
  const main=document.getElementById('main');
  if(!t){
    main.innerHTML='<div class="empty"><h3>Nenhuma turma cadastrada</h3><p>Crie a primeira turma no botão "+ Nova turma" ao lado.</p></div>';
    return;
  }
  if(!t.materias.find(m=>m.id===curMat))curMat=t.materias[0]?t.materias[0].id:null;
  let html=`
  <div class="turma-head">
    <div>
      <h2>${esc(t.nome)}</h2>
      <div class="sub">${t.alunos.length} aluno(s) · ${t.materias.length} matéria(s) · média mínima ${t.minima}</div>
    </div>
    <div class="actions">
      <button class="btn ghost sm" onclick="openTurmaModal('${t.id}')">Editar turma</button>
      <button class="btn danger-ghost sm" onclick="delTurma('${t.id}')">Excluir</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${curTab==='notas'?'active':''}" onclick="setTab('notas')">Lançar notas</button>
    <button class="tab ${curTab==='alunos'?'active':''}" onclick="setTab('alunos')">Alunos</button>
    <button class="tab ${curTab==='materias'?'active':''}" onclick="setTab('materias')">Matérias</button>
    <button class="tab ${curTab==='relatorio'?'active':''}" onclick="setTab('relatorio')">Relatório final</button>
  </div>`;
  if(curTab==='notas')html+=viewNotas(t);
  if(curTab==='alunos')html+=viewAlunos(t);
  if(curTab==='materias')html+=viewMaterias(t);
  if(curTab==='relatorio')html+=viewRelatorio(t);
  main.innerHTML=html;
}

function renderSidebar(){
  const el=document.getElementById('turmaList');
  el.innerHTML=DB.turmas.map(t=>`
    <button class="turma-item ${t.id===curTurma?'active':''}" onclick="selTurma('${t.id}')">
      <strong>${esc(t.nome)}</strong>
      <small>${t.alunos.length} aluno(s) · ${t.materias.length} matéria(s)</small>
    </button>`).join('');
}

/* ---------- Aba: Lançar notas ---------- */
function viewNotas(t){
  if(!t.materias.length)return '<div class="empty"><h3>Sem matérias</h3><p>Cadastre matérias na aba "Matérias" para lançar notas.</p></div>';
  if(!t.alunos.length)return '<div class="empty"><h3>Sem alunos</h3><p>Cadastre os alunos na aba "Alunos" para lançar notas.</p></div>';
  const mat=t.materias.find(m=>m.id===curMat)||t.materias[0];
  let html='<div class="pills">'+t.materias.map(m=>
    `<button class="pill ${m.id===mat.id?'active':''}" onclick="selMat('${m.id}')">${esc(m.nome)}</button>`).join('')+'</div>';
  const cols=Array.from({length:mat.provas},(_,i)=>`<th>P${i+1}</th>`).join('');
  html+=`<div class="card"><div class="table-wrap"><table class="grade">
    <thead><tr><th>Aluno</th>${cols}<th class="rec-th">REC</th><th>Média</th><th>Situação</th></tr></thead><tbody>`;
  sortAlunos(t).forEach(a=>{
    const o=getNotas(t,mat,a.id);
    let cells='';
    for(let i=0;i<mat.provas;i++){
      const v=(o.p&&o.p[i]!==null&&o.p[i]!==undefined)?o.p[i]:'';
      cells+=`<td><input class="nota-input" type="number" min="0" max="100" step="0.5" value="${v}"
        onchange="setNota('${mat.id}','${a.id}',${i},this.value)" aria-label="P${i+1} de ${esc(a.nome)}"></td>`;
    }
    const recV=(o.rec===null||o.rec===undefined)?'':o.rec;
    cells+=`<td><input class="nota-input rec" type="number" min="0" max="100" step="0.5" value="${recV}"
      onchange="setNota('${mat.id}','${a.id}','rec',this.value)" aria-label="Recuperação de ${esc(a.nome)}"></td>`;
    const r=mediaAluno(t,mat,a.id);
    let badge='<span class="badge pend">Pendente</span>', mediaTxt='—';
    if(r.completa){
      mediaTxt=fmt(r.media)+(r.usouRec?' <span style="font-size:11px;color:var(--red);font-weight:700">rec</span>':'');
      badge=r.media>=t.minima?'<span class="badge ok">Aprovado</span>':'<span class="badge rep">Reprovado</span>';
    }else if(r.parcial!==undefined&&r.parcial!==null){
      mediaTxt=fmt(r.parcial)+' <span style="font-size:11px;color:var(--muted)">(parcial)</span>';
    }
    html+=`<tr><td>${esc(a.nome)}</td>${cells}<td class="media-cell">${mediaTxt}</td><td>${badge}</td></tr>`;
  });
  html+='</tbody></table></div></div><p class="hint">Notas de 0 a 100. A média fecha quando todas as provas da matéria estiverem lançadas. Se houver nota de recuperação (REC), ela substitui a nota mais baixa das provas no cálculo da média — somente se for maior que ela. Média mínima para aprovação: '+t.minima+'.</p>';
  return html;
}

/* ---------- Aba: Alunos ---------- */
function viewAlunos(t){
  let html=`<div class="card"><div class="card-pad">
    <div class="add-row">
      <textarea id="novoAluno" rows="2" placeholder="Nome do aluno (ou vários, um por linha)"></textarea>
      <button class="btn navy" onclick="addAlunos()">Adicionar</button>
    </div>`;
  if(!t.alunos.length){html+='<p class="hint">Nenhum aluno cadastrado. A lista é organizada em ordem alfabética automaticamente.</p>';}
  sortAlunos(t).forEach(a=>{
    html+=`<div class="aluno-row">
      <span class="nome">${esc(a.nome)}</span>
      <button class="icon-btn" title="Renomear" onclick="renameAluno('${a.id}')">✎</button>
      <button class="icon-btn" title="Remover" onclick="delAluno('${a.id}')">✕</button>
    </div>`;
  });
  html+='</div></div><p class="hint">Ao remover um aluno, as notas dele são apagadas em todas as matérias desta turma.</p>';
  return html;
}

/* ---------- Aba: Matérias ---------- */
function viewMaterias(t){
  let html=`<div class="card"><div class="card-pad">
    <div class="add-row"><button class="btn navy" onclick="openMatModal()">+ Nova matéria</button></div>`;
  if(!t.materias.length)html+='<p class="hint">Nenhuma matéria cadastrada.</p>';
  t.materias.forEach(m=>{
    html+=`<div class="materia-row">
      <span class="nome">${esc(m.nome)}</span>
      <span class="provas">${m.provas} prova(s) · média das ${m.provas}</span>
      <button class="icon-btn" title="Editar" onclick="openMatModal('${m.id}')">✎</button>
      <button class="icon-btn" title="Remover" onclick="delMateria('${m.id}')">✕</button>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

/* ---------- Aba: Relatório ---------- */
function viewRelatorio(t){
  let html=`<div class="card"><div class="card-pad">
    <p style="margin-bottom:12px">O relatório reúne, por matéria, todas as provas e a média de cada aluno, além do quadro final consolidado. Ao clicar no botão, use a opção <strong>"Salvar como PDF"</strong> na janela de impressão do navegador.</p>
    <button class="btn red" onclick="gerarPDF()">Gerar relatório em PDF</button>
  </div></div>
  <h3 style="font-family:'Barlow Condensed';text-transform:uppercase;color:var(--navy);margin:22px 0 10px;font-size:19px">Prévia — quadro final consolidado</h3>
  <div class="card"><div class="table-wrap"><table class="grade">
    <thead><tr><th>Aluno</th>${t.materias.map(m=>`<th>${esc(m.nome)}</th>`).join('')}<th>Situação geral</th></tr></thead><tbody>`;
  sortAlunos(t).forEach(a=>{
    let allOk=true,allDone=t.materias.length>0;
    let row=`<td>${esc(a.nome)}</td>`;
    t.materias.forEach(m=>{
      const r=mediaAluno(t,m,a.id);
      if(!r.completa){allDone=false;row+='<td>—</td>';}
      else{if(r.media<t.minima)allOk=false;row+=`<td class="media-cell">${fmt(r.media)}</td>`;}
    });
    let badge='<span class="badge pend">Em curso</span>';
    if(allDone)badge=allOk?'<span class="badge ok">Aprovado</span>':'<span class="badge rep">Reprovado</span>';
    html+=`<tr>${row}<td>${badge}</td></tr>`;
  });
  html+='</tbody></table></div></div>';
  return html;
}

/* =========================================================
   Relatório PDF (via impressão do navegador)
   ========================================================= */
function gerarPDF(){
  const t=turma();if(!t)return;
  const logo=document.getElementById('logoImg').src;
  const hoje=new Date().toLocaleDateString('pt-BR');
  let html=`
  <div class="rep-head">
    <img src="${logo}" alt="">
    <div>
      <h1>Aeroclube de Londrina — Escola de Aviação Civil</h1>
      <p>Relatório final de notas · ${esc(t.nome)} · Emitido em ${hoje}</p>
    </div>
  </div>
  <div class="rep-strip"></div>`;
  t.materias.forEach(m=>{
    const cols=Array.from({length:m.provas},(_,i)=>`<th>P${i+1}</th>`).join('');
    html+=`<h2>${esc(m.nome)} — ${m.provas} prova(s)</h2>
    <table><thead><tr><th>Aluno</th>${cols}<th>REC</th><th>Média</th><th>Situação</th></tr></thead><tbody>`;
    sortAlunos(t).forEach(a=>{
      const o=getNotas(t,m,a.id);
      let cells='';
      for(let i=0;i<m.provas;i++){
        const v=o.p?o.p[i]:null;cells+=`<td>${v===null||v===undefined||v===''?'—':fmt(Number(v))}</td>`;
      }
      const r=mediaAluno(t,m,a.id);
      cells+=`<td>${r.rec===null?'—':fmt(r.rec)}</td>`;
      const sit=r.completa?(r.media>=t.minima?'Aprovado':'Reprovado'):'Pendente';
      html+=`<tr><td>${esc(a.nome)}</td>${cells}<td class="final-strong">${r.completa?fmt(r.media):'—'}${r.usouRec?'*':''}</td><td>${sit}</td></tr>`;
    });
    html+='</tbody></table>';
  });
  html+=`<h2>Quadro final consolidado</h2>
  <table><thead><tr><th>Aluno</th>${t.materias.map(m=>`<th>${esc(m.nome)}</th>`).join('')}<th>Situação geral</th></tr></thead><tbody>`;
  sortAlunos(t).forEach(a=>{
    let allOk=true,allDone=t.materias.length>0,row=`<td>${esc(a.nome)}</td>`;
    t.materias.forEach(m=>{
      const r=mediaAluno(t,m,a.id);
      if(!r.completa){allDone=false;row+='<td>—</td>';}
      else{if(r.media<t.minima)allOk=false;row+=`<td class="final-strong">${fmt(r.media)}</td>`;}
    });
    const sit=allDone?(allOk?'Aprovado':'Reprovado'):'Em curso';
    html+=`<tr>${row}<td>${sit}</td></tr>`;
  });
  html+=`</tbody></table>
  <p style="font-size:12px;margin-top:10px;color:#444">Nota mínima para aprovação: ${t.minima}. Média final por matéria: média aritmética das provas. * Quando há nota de recuperação (REC) maior que a menor nota de prova, ela a substitui no cálculo da média.</p>
  <div class="rep-foot">
    <span>Aeroclube de Londrina · Escola de Aviação Civil</span>
    <div class="assin">Instrutor responsável</div>
  </div>`;
  document.getElementById('report').innerHTML=html;
  setTimeout(()=>window.print(),100);
}

/* =========================================================
   Ações
   ========================================================= */
function setTab(t){curTab=t;render();}
function selTurma(id){curTurma=id;curMat=null;render();}
function selMat(id){curMat=id;render();}

function setNota(matId,alunoId,idx,val){
  const t=turma();if(!t)return;
  if(!t.notas[matId])t.notas[matId]={};
  const mat=t.materias.find(m=>m.id===matId);
  if(!t.notas[matId][alunoId])t.notas[matId][alunoId]={p:Array(mat.provas).fill(null),rec:null};
  const o=t.notas[matId][alunoId];
  let v=val===''?null:Math.max(0,Math.min(100,Number(val)));
  if(v!==null&&isNaN(v))v=null;
  if(idx==='rec')o.rec=v;else o.p[idx]=v;
  persist();render();
}

/* --- Turmas --- */
function openTurmaModal(id){
  editingTurma=id||null;
  document.getElementById('turmaModalTitle').textContent=id?'Editar turma':'Nova turma';
  document.getElementById('tModeloWrap').style.display=id?'none':'block';
  if(id){
    const t=DB.turmas.find(x=>x.id===id);
    document.getElementById('tNome').value=t.nome;
    document.getElementById('tMinima').value=t.minima;
  }else{
    document.getElementById('tNome').value='';
    document.getElementById('tMinima').value='70';
  }
  document.getElementById('turmaOverlay').classList.add('open');
  document.getElementById('tNome').focus();
}
function saveTurma(){
  const nome=document.getElementById('tNome').value.trim();
  const minima=Number(document.getElementById('tMinima').value)||70;
  if(!nome){alert('Informe o nome da turma.');return;}
  if(editingTurma){
    const t=DB.turmas.find(x=>x.id===editingTurma);
    t.nome=nome;t.minima=minima;
  }else{
    const modelo=document.getElementById('tModelo').value;
    let materias=[];
    if(modelo==='pp')materias=[{id:uid(),nome:'Teoria de Voo — Piloto Privado',provas:3}];
    if(modelo==='pc')materias=[{id:uid(),nome:'Teoria de Voo — Piloto Comercial',provas:3}];
    if(modelo==='cms')materias=[{id:uid(),nome:'Meteorologia',provas:2},{id:uid(),nome:'Navegação',provas:2},{id:uid(),nome:'CGA',provas:2}];
    const nt={id:uid(),nome,minima,alunos:[],materias,notas:{}};
    DB.turmas.push(nt);curTurma=nt.id;curMat=null;curTab='alunos';
  }
  persist();closeModal('turmaOverlay');render();
}
function delTurma(id){
  const t=DB.turmas.find(x=>x.id===id);
  if(!confirm(`Excluir a turma "${t.nome}" e todas as suas notas? Esta ação não pode ser desfeita.`))return;
  DB.turmas=DB.turmas.filter(x=>x.id!==id);
  curTurma=DB.turmas[0]?DB.turmas[0].id:null;curMat=null;
  persist();render();
}

/* --- Matérias --- */
function openMatModal(id){
  editingMat=id||null;
  document.getElementById('matModalTitle').textContent=id?'Editar matéria':'Nova matéria';
  if(id){
    const m=turma().materias.find(x=>x.id===id);
    document.getElementById('mNome').value=m.nome;
    document.getElementById('mProvas').value=m.provas;
  }else{
    document.getElementById('mNome').value='';
    document.getElementById('mProvas').value='2';
  }
  document.getElementById('matOverlay').classList.add('open');
  document.getElementById('mNome').focus();
}
function saveMateria(){
  const t=turma();
  const nome=document.getElementById('mNome').value.trim();
  const provas=Math.max(1,Math.min(10,Number(document.getElementById('mProvas').value)||1));
  if(!nome){alert('Informe o nome da matéria.');return;}
  if(editingMat){
    const m=t.materias.find(x=>x.id===editingMat);
    m.nome=nome;
    if(provas!==m.provas&&t.notas[m.id]){
      Object.keys(t.notas[m.id]).forEach(aid=>{
        const o=t.notas[m.id][aid]||{p:[],rec:null};
        const arr=o.p||[];
        t.notas[m.id][aid]={p:Array.from({length:provas},(_,i)=>arr[i]??null),rec:o.rec??null};
      });
    }
    m.provas=provas;
  }else{
    const m={id:uid(),nome,provas};
    t.materias.push(m);curMat=m.id;
  }
  persist();closeModal('matOverlay');render();
}
function delMateria(id){
  const t=turma();const m=t.materias.find(x=>x.id===id);
  if(!confirm(`Remover a matéria "${m.nome}" e todas as notas lançadas nela?`))return;
  t.materias=t.materias.filter(x=>x.id!==id);
  delete t.notas[id];
  if(curMat===id)curMat=null;
  persist();render();
}

/* --- Alunos --- */
function addAlunos(){
  const t=turma();
  const raw=document.getElementById('novoAluno').value;
  const nomes=raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!nomes.length)return;
  nomes.forEach(n=>t.alunos.push({id:uid(),nome:n}));
  persist();render();
}
function renameAluno(id){
  const t=turma();const a=t.alunos.find(x=>x.id===id);
  const novo=prompt('Novo nome do aluno:',a.nome);
  if(novo&&novo.trim()){a.nome=novo.trim();persist();render();}
}
function delAluno(id){
  const t=turma();const a=t.alunos.find(x=>x.id===id);
  if(!confirm(`Remover ${a.nome} e apagar as notas dele(a) nesta turma?`))return;
  t.alunos=t.alunos.filter(x=>x.id!==id);
  Object.values(t.notas).forEach(porAluno=>{delete porAluno[id];});
  persist();render();
}

/* --- Backup --- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-notas-aeroclube-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.turmas)throw new Error();
      if(!confirm('Importar este backup vai substituir todos os dados atuais. Continuar?'))return;
      DB=data;curTurma=DB.turmas[0]?DB.turmas[0].id:null;curMat=null;
      persist();render();
    }catch(e){alert('Arquivo inválido. Selecione um backup exportado por este sistema.');}
    input.value='';
  };
  r.readAsText(f);
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

render();
</script>
